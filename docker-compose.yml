services:
  # Code Interpreter API (unified image with nsjail sandboxing)
  api:
    build:
      context: .
      target: app
    image: ${API_IMAGE:-code-interpreter:nsjail}
    pull_policy: never
    container_name: code-interpreter-api
    restart: unless-stopped
    # tini init process reaps zombie nsjail/python child processes
    init: true
    # nsjail requires these capabilities to create namespaces and cgroups
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Container-specific overrides (service discovery within compose network)
      - REDIS_HOST=redis
      - S3_ENDPOINT=garage:3900
    volumes:
      - sandbox-data:/var/lib/code-interpreter/sandboxes
      # SSL_CERTS_PATH is a host path; SSL_CERT_FILE and SSL_KEY_FILE must point
      # to the mounted files inside the container under /app/ssl.
      - ${SSL_CERTS_PATH:-./ssl}:/app/ssl:ro
    tmpfs:
      - /app/data:size=100m
    depends_on:
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || curl -fsk https://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    # No /var/run/docker.sock mount needed

  # Redis for session management
  redis:
    image: redis:7-alpine
    container_name: code-interpreter-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Garage S3-compatible object storage (replaces MinIO)
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: code-interpreter-garage
    restart: unless-stopped
    command: >
      server
      --single-node
      --default-bucket ${S3_BUCKET:-code-interpreter-files}
    ports:
      - "127.0.0.1:${S3_PORT:-3900}:3900"
      - "127.0.0.1:${GARAGE_ADMIN_PORT:-3903}:3903"
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - garage-data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3900 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sandbox-data:
  redis-data:
  garage-data:
