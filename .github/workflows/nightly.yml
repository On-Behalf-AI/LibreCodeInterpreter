name: Nightly Validation

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  RUNTIME_CORE_IMAGE: ghcr.io/${{ github.repository }}/runtime-core
  RUNTIME_R_IMAGE: ghcr.io/${{ github.repository }}/runtime-r
  BUILDCACHE_IMAGE: ghcr.io/${{ github.repository }}/buildcache
  LOCAL_API_IMAGE_AMD64: code-interpreter:nightly-amd64
  LOCAL_API_IMAGE_ARM64: code-interpreter:nightly-arm64

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      runtime_hash: ${{ steps.runtime.outputs.runtime_hash }}
    steps:
      - uses: actions/checkout@v4

      - id: runtime
        run: echo "runtime_hash=$(scripts/ci/compute_runtime_hash.sh)" >> "${GITHUB_OUTPUT}"

  refresh-runtime:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish runtime-core
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-core
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          tags: ${{ env.RUNTIME_CORE_IMAGE }}:${{ needs.prepare.outputs.runtime_hash }}-${{ matrix.arch }}
          cache-from: |
            type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:runtime-core-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:runtime-core-${{ matrix.arch }},mode=max

      - name: Build and publish runtime-r
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-r
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          tags: ${{ env.RUNTIME_R_IMAGE }}:${{ needs.prepare.outputs.runtime_hash }}-${{ matrix.arch }}
          cache-from: |
            type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:runtime-core-${{ matrix.arch }}
            type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:runtime-r-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:runtime-r-${{ matrix.arch }},mode=max

  publish-runtime-manifests:
    needs: [prepare, refresh-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly runtime manifests
        run: |
          docker buildx imagetools create \
            -t "${RUNTIME_CORE_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}" \
            "${RUNTIME_CORE_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}-amd64" \
            "${RUNTIME_CORE_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}-arm64"

          docker buildx imagetools create \
            -t "${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}" \
            "${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}-amd64" \
            "${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}-arm64"

  full-live-amd64:
    needs: [prepare, publish-runtime-manifests]
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Build nightly amd64 image
        run: |
          docker buildx build \
            --load \
            --target app \
            --tag "${LOCAL_API_IMAGE_AMD64}" \
            --build-arg "RUNTIME_R_BASE=${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}" \
            --cache-from "type=registry,ref=${BUILDCACHE_IMAGE}:app-amd64" \
            --cache-to "type=registry,ref=${BUILDCACHE_IMAGE}:app-amd64,mode=max" \
            .

      - name: Start nightly stack
        env:
          API_IMAGE: ${{ env.LOCAL_API_IMAGE_AMD64 }}
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Wait for API
        run: |
          if ! scripts/ci/wait_for_api.sh http://localhost:8000/health 24 5; then
            docker compose logs --no-color api
            exit 1
          fi

      - name: Run full live functional suite
        env:
          API_BASE: http://localhost:8000
          API_KEY: your-secure-api-key-here-change-this-in-production
        run: |
          mkdir -p test-results
          pytest tests/functional/ -m live_api -v --junitxml=test-results/nightly-full-live-amd64.xml

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs --no-color > nightly-full-amd64.log

      - name: Upload nightly full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-live-amd64
          path: |
            test-results/
            nightly-full-amd64.log
          if-no-files-found: ignore

      - name: Stop nightly stack
        if: always()
        run: docker compose down -v

  slow-live-amd64:
    needs: [prepare, publish-runtime-manifests]
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Build nightly amd64 image
        run: |
          docker buildx build \
            --load \
            --target app \
            --tag "${LOCAL_API_IMAGE_AMD64}" \
            --build-arg "RUNTIME_R_BASE=${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}" \
            --cache-from "type=registry,ref=${BUILDCACHE_IMAGE}:app-amd64" \
            --cache-to "type=registry,ref=${BUILDCACHE_IMAGE}:app-amd64,mode=max" \
            .

      - name: Start nightly stack
        env:
          API_IMAGE: ${{ env.LOCAL_API_IMAGE_AMD64 }}
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Wait for API
        run: |
          if ! scripts/ci/wait_for_api.sh http://localhost:8000/health 24 5; then
            docker compose logs --no-color api
            exit 1
          fi

      - name: Run slow live suite
        env:
          API_BASE: http://localhost:8000
          API_KEY: your-secure-api-key-here-change-this-in-production
        run: |
          mkdir -p test-results
          pytest tests/functional/ -m slow -v --junitxml=test-results/nightly-slow-live-amd64.xml

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs --no-color > nightly-slow-amd64.log

      - name: Upload nightly slow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-slow-live-amd64
          path: |
            test-results/
            nightly-slow-amd64.log
          if-no-files-found: ignore

      - name: Stop nightly stack
        if: always()
        run: docker compose down -v

  arm64-smoke:
    needs: [prepare, publish-runtime-manifests]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Build nightly arm64 image
        run: |
          docker buildx build \
            --load \
            --target app \
            --tag "${LOCAL_API_IMAGE_ARM64}" \
            --build-arg "RUNTIME_R_BASE=${RUNTIME_R_IMAGE}:${{ needs.prepare.outputs.runtime_hash }}" \
            --cache-from "type=registry,ref=${BUILDCACHE_IMAGE}:app-arm64" \
            --cache-to "type=registry,ref=${BUILDCACHE_IMAGE}:app-arm64,mode=max" \
            .

      - name: Start nightly arm64 stack
        env:
          API_IMAGE: ${{ env.LOCAL_API_IMAGE_ARM64 }}
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Wait for API
        run: |
          if ! scripts/ci/wait_for_api.sh http://localhost:8000/health 24 5; then
            docker compose logs --no-color api
            exit 1
          fi

      - name: Run nightly arm64 smoke suite
        env:
          API_BASE: http://localhost:8000
          API_KEY: your-secure-api-key-here-change-this-in-production
        run: |
          mkdir -p test-results
          pytest \
            tests/functional/test_health.py \
            tests/functional/test_exec_workflow.py::TestSessionWorkflow::test_execution_creates_session \
            tests/functional/test_files.py::TestFileUpload::test_upload_single_file \
            tests/functional/test_ptc.py::TestPTCInitialExecution::test_ptc_simple_code_completes \
            -v \
            --junitxml=test-results/nightly-arm64-smoke.xml

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs --no-color > nightly-arm64.log

      - name: Upload nightly arm64 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-arm64-smoke
          path: |
            test-results/
            nightly-arm64.log
          if-no-files-found: ignore

      - name: Stop nightly arm64 stack
        if: always()
        run: docker compose down -v
