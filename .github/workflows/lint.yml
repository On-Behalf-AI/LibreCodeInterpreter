name: Lint and Format

on:
  pull_request:
    branches: [main, dev]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black mypy pytest pytest-asyncio pytest-cov pytest-mock bandit

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. Default is 79 chars, matching strict flake8.
          flake8 src/ --count --exit-zero --max-complexity=10 --statistics

      - name: Check formatting with Black
        run: |
          # This will fail if code is not formatted. Run 'black src/' locally to fix.
          black src/ --check

      - name: Type checking with mypy
        run: |
          mypy src/

      - name: Security scan with Bandit
        run: |
          bandit -r src/ -s B104,B108 --severity-level high

      - name: Run Unit Tests
        run: |
          pytest tests/unit/

      - name: Run Integration Tests
        run: |
          pytest tests/integration/

  functional-live:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Prepare environment
        run: |
          cp .env.example .env

      - name: Start live test stack
        run: |
          docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 24); do
            if curl -fs http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --no-color api
          exit 1

      - name: Run Functional Live API Tests
        env:
          API_BASE: http://localhost:8000
          API_KEY: your-secure-api-key-here-change-this-in-production
        run: |
          pytest tests/functional/ -m live_api -v

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Stop live test stack
        if: always()
        run: |
          docker compose down -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
